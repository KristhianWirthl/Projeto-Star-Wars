    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
                
        const ctx = document.getElementById('Ranking');

                const labels = ['Sem Midichlorianos','Youngling','Padawan','Cavaleiro Jedi','Mestre Jedi', 'Grão-Mestre Jedi'];
                const lista = [1, 3, 7, 8, 5, 1]
                const data = {
                    labels:labels,
                    datasets: [{
                        label: 'Quantidade de usuários por Ranking',
                        // label: trazerinformaçõestotal(),
                        data: lista,
                        backgroundColor: [
                            '#A9B4C2',
                            '#B2B3A2',
                            '#A2A8A0',
                            '#C2A8B7',
                            '#B7B2B7',
                            '#C9C1A6'
                    ],
                        borderWidth: 2
                    }]
                }
            
  new Chart(ctx, {
    type: 'bar',
    data: data,
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
                
    </script>
