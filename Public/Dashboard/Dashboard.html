<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Star Wars</title>
</head>
<link rel="stylesheet" href="../Style/dashboard.css">

<body onload="obterDadosGrafico();atualizarKPIs()">
    <header>
        <div class="container">
            <image src="../Images/Star Wars Logo.png" class="logo"></image>
            <h1 class="titulo">Star Wars</h1>
            <nav id="navss" class="navs">
                <a href="../Pages/StarWars.html" class="navegacao">Home</a>
                <a id="a_cad" href="../Pages/Cadastro.html" class="navegacao">Cadastro</a>
                <a id="a_login" href="../Pages/Login.html" class="navegacao">Login</a>
                <button id="a_logout" onclick="sair()" class="navegacao ">Logout</button>
                <a id="a_quiz" href="../Pages/Quiz.html" class="navegacao">Quiz</a>
                <a href="../Pages/Timeline.html" class="navegacao">Timeline</a>
                <a href="./Dashboard.html" class="navegacao_atual">Dashboard</a>
            </nav>
        </div>
    </header>
    <div class="dashboard">
        <div class="kpis-container">
            <p id="kpi_nome" class="kpis"></p>
            <p id="kpi_classificacao" class="kpis"></p>
            <p id="kpi_pontuacao" class="kpis"></p>
        </div>
        <div class="grafico">
            <canvas id="Ranking"></canvas>
        </div>
    </div>
    <div id="div_mensagem"></div>


    <audio id="musica" src="../Sounds/Copyright Free Star Wars Music - The Path of the Force.mp3" autoplay loop></audio>


    <footer>
        <div class="footer">
            <div class="suporte"><p>Suporte: JediSith@Skyriver.all</p>
      </div>
            <p>2026 Kristhian Wirthl - Star Wars Fan Page - STAR WARS © 2026 & TM Lucasfilm Ltd. All rights Reserved</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>

        var idusuario = sessionStorage.ID_USUARIO;
        var nomeusuario = sessionStorage.NOME_USUARIO;

        function verificarlogin() {

            console.log('teste', idusuario)

            var nav = document.getElementById("navss");

            if (idusuario != null) {
                a_cad.style.display = "none";
                a_login.style.display = "none";
                a_logout.style.display = "flex";
            } else {
                a_cad.style.display = "flex";
                a_login.style.display = "flex";
                a_logout.style.display = "none";
            }
        }

        function sair() {
            sessionStorage.clear();
            window.location = "../Pages/StarWars.html"
        }

        verificarlogin()

        function atualizarKPIs() {
            fetch(`/quiz/ranking/${idusuario}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);

                        if (resposta.length > 0) {

                            document.getElementById("kpi_nome").innerHTML = `${resposta[0].Nome}`;

                            document.getElementById("kpi_classificacao").innerHTML = `${resposta[0].Classificação}`;

                            document.getElementById("kpi_pontuacao").innerHTML = `${resposta[0].Pontuação}`
                        } else {

                            document.getElementById("kpi_nome").innerHTML = `${resposta[0].Nome}`;

                            document.getElementById("kpi_classificacao").innerHTML = `---`;

                            document.getElementById("kpi_pontuacao").innerHTML = `---`

                        }

                    });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
                });
        }

        function obterDadosGrafico() {
            fetch(`/quiz/ranking`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            }).then(function (response) {
                console.log(response)
                if (response.ok) {
                    response.json().then(function (resposta) {
                        console.log('Dados do gráfico', resposta)
                        plotarGrafico(resposta);
                    })
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
                });
        }

        function plotarGrafico(resposta) {

            console.log('iniciando plotagem do gráfico...');

            let ordemRanking = [
                'Sem Midichlorianos',
                'Youngling',
                'Padawan',
                'Cavaleiro Jedi',
                'Mestre Jedi',
                'Grão-Mestre Jedi'
            ]

            let graficoDados = {
                labels: ordemRanking,
                dados: []
            }

            let totalclassificacao = [];
            let classificacaoatual = 0;
            let totalfinal = [];

            for (let i = 0; i < ordemRanking.length; i++) {
                classificacaoatual = ordemRanking[i];
                for (let j = 0; j < resposta.length; j++) {
                    if (resposta[j].classificacao == classificacaoatual) {
                        totalclassificacao = resposta[j].Total
                    }
                }
                totalfinal.push(totalclassificacao);
            }

            const ctx = document.getElementById('Ranking');

            let data = {
                labels: graficoDados.labels,
                datasets: [{
                    label: 'Quantidade de usuários por Ranking',
                    data: totalfinal,
                    backgroundColor: [
                        '#A9B4C2',
                        '#B2B3A2',
                        '#A2A8A0',
                        '#C2A8B7',
                        '#B7B2B7',
                        '#C9C1A6'
                    ],
                    borderWidth: 2
                }]
            }

            new Chart(ctx, {
                type: 'bar',
                data: data,
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                            }
                        }
                    }
                }
            });

        }


    </script>
