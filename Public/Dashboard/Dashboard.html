<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Star Wars</title>
</head>
<link rel="stylesheet" href="../Style/dashboard.css">

<body>
    <header>
        <div class="container">
            <image src="../Images/Star Wars Logo.png" class="logo"></image>
            <h1 class="titulo">Star Wars</h1>
            <nav id="navss" class="navs">
                <a href="../Pages/StarWars.html" class="navegacao">Home</a>
                <a id="a_cad" href="../Pages/Cadastro.html" class="navegacao">Cadastro</a>
                <a id="a_login" href="../Pages/Login.html" class="navegacao">Login</a>
                <button id="a_logout" onclick="sair()" class="navegacao ">Logout</button>
                <a href="../Pages/Quiz.html" class="navegacao">Quiz</a>
                <a href="../Pages/Timeline.html" class="navegacao">Timeline</a>
                <a href="./Dashboard.html" class="navegacao_atual">Dashboard</a>
            </nav>
        </div>
    </header>

    <div class="dashboard">
        <div class="kpis-container">
            <p class="kpis">Mestre-Jedi</p>
            <!-- colocar 1 de pontuação e outro classificação  -->
            <p class="kpis">11</p>
        </div>
        <div class="grafico">
            <canvas id="Ranking"></canvas>
        </div>
    </div>



    <audio id="musica" src="../Sounds/Copyright Free Star Wars Music - The Path of the Force.mp3" autoplay loop></audio>


    <footer>
        <div class="footer">
            <p>2026 Kristhian Wirthl - Star Wars Fan Page - STAR WARS © 2026 & TM Lucasfilm Ltd. All rights Reserved</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>

        function verificarlogin() {

            var idusuario = sessionStorage.ID_USUARIO;

            var nav = document.getElementById("navss");

            if (idusuario != null) {
                a_cad.style.display = "none";
                a_login.style.display = "none";
                a_logout.style.display = "flex";
            } else {
                a_cad.style.display = "flex";
                a_login.style.display = "flex";
                a_logout.style.display = "none";
            }
        }

        function sair() {
            sessionStorage.clear();
            window.location = "StarWars.html"
        }

        verificarlogin()

        fetch("/usuarios/resultado",
            method: "get",
            headers:
            "Content-Type": "application/json",)

        const ctx = document.getElementById('Ranking');

        const labels = ['Sem Midichlorianos', 'Youngling', 'Padawan', 'Cavaleiro Jedi', 'Mestre Jedi', 'Grão-Mestre Jedi'];
        const lista = 
        const data = {
            labels: labels,
            datasets: [{
                label: 'Quantidade de usuários por Ranking',
                // label: trazerinformaçõestotal(),
                data: lista,
                backgroundColor: [
                    '#A9B4C2',
                    '#B2B3A2',
                    '#A2A8A0',
                    '#C2A8B7',
                    '#B7B2B7',
                    '#C9C1A6'
                ],
                borderWidth: 2
            }]
        }

        new Chart(ctx, {
            type: 'bar',
            data: data,
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

    </script>

    <!-- a lista, eu quero que ele puxe de um banco de dados. Eu fiz um quiz, e o que acontece, toda vez que alguem responde o quiz,
     quero que o resultado seja armazenado no perfil de quem fez, e automaticamente será lançado em uma lista, e no dashboard os dados
     que aparecerão são dessa lista -->
