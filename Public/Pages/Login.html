<script>

    function verificarlogin() {

        var idusuario = sessionStorage.ID_USUARIO;

        var nav = document.getElementById("navss");

        if (idusuario != null) {
            a_cad.style.display = "none";
            a_login.style.display = "none";
            a_dashboard.style.display = "flex";
            a_logout.style.display = "flex";
        } else {
            a_cad.style.display = "flex";
            a_login.style.display = "flex";
            a_dashboard.style.display = "none";
            a_logout.style.display = "none";
        }
    }

    function sair() {
        sessionStorage.clear();
        window.location = "StarWars.html"
    }

    verificarlogin()

    function limparFormulario() {
        email_input.value = "";
        senha_input.value = "";
    }

    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }
        else {
            console.log("Deu erro")
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                alert("Login realizado com sucesso");

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    limparFormulario();
                    setTimeout(function () {
                        window.location = "./Quiz.html";
                    }, 1000);

                });

            } else {

                limparFormulario();

                alert("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    }

    function logout() {
        if (autenticar) {
            sessionStorage.clear();
            window.location.href = "./Login.html"
        }
    }

</script>
