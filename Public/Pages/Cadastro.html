</head>
<link rel="stylesheet" href="../Style/cadastro.css">
<body>
    <header>
        <div class="container">
            <image src="../Images/Star Wars Logo.png" class="logo"></image>
            <h1 class="titulo">Star Wars</h1>
            <nav class="navs">
                <a href="./StarWars.html" class="navegacao">Home</a>
                <a href="./Cadastro.html" class="navegacao_atual">Cadastro</a>
                <a href="./Login.html" class="navegacao">Login</a>
                <a href="./Quiz.html" class="navegacao">Quiz</a>
                <a href="./Timeline.html" class="navegacao">Timeline</a>
                <a href="../Dashboard/Dashboard.html" class="navegacao">Dashboard</a>
            </nav>
        </div>
    </header>
    <div class="form">
      <div class="containerimagem1">
  <img src="../Images/Baby Yoda bebendo GIF.gif">
    </div>
        <div class="containerform">
            <div class="titulo-form">
                <h2>Cadastro</h2>
            </div>
            <div class="inputs">
                <audio id="musica" src="../Sounds/Copyright Free Star Wars Music - The Path of the Force.mp3" autoplay loop></audio>
                <input type="text" id="nome_input" placeholder="Nome Completo"><br>
                <input type="text" id="idade_input" placeholder="Idade"><br>
                <input type="text" id="planeta_origem_input" placeholder="Planeta de Origem"><br>
                <input type="text" id="especie_input" placeholder="Espécie"><br>
                <input type="text" id="nave_input" placeholder="Nave"><br>
                <input type="text" id="email_input" placeholder="E-mail"><br>
                <input type="password" id="senha_input" placeholder="Senha"><br>
                <input type="password" id="confirmar_senha_input" placeholder="Confirmar Senha"><br>
            </div>
            <button onclick="cadastrar()">Cadastrar</button>
        </div>
            <div class="containerimagem1">
            <img src="../Images/Baby Yoda bebendo GIF.gif">
    </div>
    </div>

        </div>
    </footer>
</body>
</html>

<script>

  function limparFormulario(){
    nome_input.value = "";
    idade_input.value = "";
    planeta_origem_input.value = "";
    especie_input.value = "";
    nave_input.value = "";
    email_input.value = "";
    senha_input.value = "";
    confirmar_senha_input.value = "";
  }

  function cadastrar() {

    console.log("Chamei a função")

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var idadeVar = idade_input.value;
    var planetaVar = planeta_origem_input.value;
    var especieVar = especie_input.value;
    var naveVar = nave_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmarSenhaVar = confirmar_senha_input.value;

    console.log(`Dados que vou capurar: ${nomeVar}, ${idadeVar}, ${planetaVar}, ${especieVar}, ${naveVar}, ${emailVar}, ${senhaVar}`)

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      idadeVar == "" || 
      planetaVar == "" ||
      especieVar == "" ||
      naveVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmarSenhaVar == "" ||
      senhaVar != confirmarSenhaVar
    ) {
      // cardErro.style.display = "block";
      // mensagem_erro.innerHTML =
      //   "(Alerta, robô detectado, por favor preencha corretamente)";

      console.log("Campos Vazios")
      limparFormulario();
      alert("Algum erro foi detectado!")
      //finalizarAguardar();
      //return false;
    }else{


    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        idadeServer: idadeVar,
        planetaServer: planetaVar,
        especieServer: especieVar,
        naveServer: naveVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert("Cadastrado com sucesso")

          setTimeout(() => {
            window.location = "Login.html";
          }, "2000");

          limparFormulario();
          //finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        //finalizarAguardar();
      });
      
    return false;
  }
  }
</script>
